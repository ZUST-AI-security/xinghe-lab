# 星河智安 (XingHe ZhiAn) - Docker Compose 生产部署
# 用法:
#   首次部署: cp .env.production .env && ./scripts/init-ssl.sh yourdomain.com
#   启动:     docker compose up -d
#   日志:     docker compose logs -f
#   停止:     docker compose down

services:
  # ──────────────────────────────────────
  # PostgreSQL 数据库
  # ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xinghe_zhi_an}
      POSTGRES_USER: ${POSTGRES_USER:-xinghe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$POSTGRES_USER\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    # 不对外暴露端口，仅内部访问
    # ports:
    #   - "5432:5432"

  # ──────────────────────────────────────
  # Redis
  # ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?请在 .env 中设置 REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ──────────────────────────────────────
  # 后端 API (FastAPI)
  # ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        DEVICE: ${DEVICE:-gpu}
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-xinghe}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-xinghe_zhi_an}
      REDIS_URL: redis://:${REDIS_PASSWORD:?请在 .env 中设置 REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?请在 .env 中设置 REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?请在 .env 中设置 REDIS_PASSWORD}@redis:6379/0
    volumes:
      - backend_outputs:/app/outputs
      - backend_models:/app/models
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  # ──────────────────────────────────────
  # Celery Worker（攻击任务执行）
  # ──────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        DEVICE: ${DEVICE:-gpu}
    restart: unless-stopped
    entrypoint: ["/app/entrypoint.sh"]
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2 --max-tasks-per-child=50
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-xinghe}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-xinghe_zhi_an}
      REDIS_URL: redis://:${REDIS_PASSWORD:?请在 .env 中设置 REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?请在 .env 中设置 REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?请在 .env 中设置 REDIS_PASSWORD}@redis:6379/0
    volumes:
      - backend_outputs:/app/outputs
      - backend_models:/app/models
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ──────────────────────────────────────
  # Celery Beat（定时任务）
  # ──────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        DEVICE: ${DEVICE:-gpu}
    restart: unless-stopped
    entrypoint: ["/app/entrypoint.sh"]
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-xinghe}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-xinghe_zhi_an}
      REDIS_URL: redis://:${REDIS_PASSWORD:?请在 .env 中设置 REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?请在 .env 中设置 REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?请在 .env 中设置 REDIS_PASSWORD}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

  # ──────────────────────────────────────
  # Nginx（反向代理 + SSL）
  # ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web/dist:/usr/share/nginx/html:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  backend_outputs:
  backend_models:

networks:
  internal:
    driver: bridge
